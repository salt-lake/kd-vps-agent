name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build node-agent (ikev2)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o node-agent .

      - name: Build node-agent-xray
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -tags xray -o node-agent-xray .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            node-agent
            node-agent-xray
          generate_release_notes: true
