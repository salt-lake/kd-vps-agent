name: Release

on:
  push:
    tags:
      - 'v*-ikev2'
      - 'v*-xray'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build node-agent (ikev2)
        if: ${{ endsWith(github.ref_name, '-ikev2') }}
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o node-agent-ikev2 .

      - name: Build node-agent-xray
        if: ${{ endsWith(github.ref_name, '-xray') }}
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -tags xray -o node-agent-xray .

      - name: Generate checksums
        run: |
          [ -f node-agent-ikev2 ] && sha256sum node-agent-ikev2 > node-agent-ikev2.sha256 || true
          [ -f node-agent-xray  ] && sha256sum node-agent-xray  > node-agent-xray.sha256  || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: node-agent-*
          generate_release_notes: true
